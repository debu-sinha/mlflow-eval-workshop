name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint eval_gate.py and tests
        run: ruff check eval_gate.py tests/

      - name: Format check eval_gate.py and tests
        run: ruff format --check eval_gate.py tests/

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package (same as README local path)
        run: pip install ".[local]" pytest

      - name: Verify every scorer the notebooks use
        run: |
          python -c "
          # Core scorers
          from mlflow.genai.scorers import (
              Correctness,
              Safety,
              RelevanceToQuery,
              scorer,
          )
          # Custom judge builder
          from mlflow.genai import make_judge

          # Third-party scorers. Guardrails is optional (Hub token + validator install).
          from mlflow.genai.scorers.phoenix import Hallucination
          from mlflow.genai.scorers.trulens import Groundedness
          try:
              from mlflow.genai.scorers.guardrails import DetectPII
              print('Guardrails DetectPII import OK')
          except Exception as e:
              print(f'Guardrails DetectPII unavailable (optional): {e}')

          print('All required scorer imports OK')
          "

      - name: Run pytest
        run: pytest tests/ -v

      - name: Verify notebooks parse
        run: |
          python -c "
          import ast, pathlib
          for f in sorted(pathlib.Path('notebooks').glob('*.py')):
              ast.parse(f.read_text())
              print(f'  OK: {f.name}')
          print('All notebooks parse OK')
          "
