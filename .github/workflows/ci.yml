name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint eval_gate.py
        run: ruff check eval_gate.py

      - name: Format check eval_gate.py
        run: ruff format --check eval_gate.py

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mlflow[genai] arize-phoenix-evals trulens trulens-providers-litellm numpy scikit-learn

      - name: Verify scorer imports
        run: |
          python -c "
          from mlflow.genai.scorers import Correctness, Safety, scorer
          from mlflow.genai.scorers.phoenix import Hallucination
          from mlflow.genai.scorers.trulens import Groundedness
          print('All scorer imports OK')
          "

      - name: Verify eval_gate module loads and gate logic works
        run: |
          python -c "
          from eval_gate import run_gate, _parse_score

          # Binary scorer parse
          assert _parse_score('yes') == 1.0
          assert _parse_score('no') == 0.0
          assert _parse_score(0.75) == 0.75
          assert _parse_score(None) is None

          # Gate passes on low regression
          bl = {f's{i}': 1.0 for i in range(20)}
          bl['s19'] = 0.0
          cd = dict(bl)
          cd['s0'] = 0.0
          cd['s19'] = 1.0
          passed, _ = run_gate(bl, cd)
          assert passed, 'Should pass with 5% regression'

          # Gate fails closed on zero overlap
          passed, _ = run_gate({'a': 1.0}, {'b': 1.0})
          assert not passed, 'Should fail on zero overlap'

          print('eval_gate OK')
          "

      - name: Verify notebooks parse
        run: |
          python -c "
          import ast, pathlib
          for f in sorted(pathlib.Path('notebooks').glob('*.py')):
              ast.parse(f.read_text())
              print(f'  OK: {f.name}')
          print('All notebooks parse OK')
          "
