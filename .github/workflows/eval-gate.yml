name: Evaluation Gate

on:
  workflow_dispatch:
    inputs:
      baseline_run_id:
        description: 'MLflow run ID for baseline evaluation'
        required: true
      candidate_run_id:
        description: 'MLflow run ID for candidate evaluation'
        required: true
      scorer:
        description: 'Scorer name to compare'
        required: false
        default: 'correctness'
      threshold:
        description: 'Max regression rate (0.0-1.0)'
        required: false
        default: '0.10'
      min_overlap:
        description: 'Minimum overlapping samples (use 30+ for production)'
        required: false
        default: '30'

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install "mlflow[genai]" numpy

      - name: Run evaluation gate
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          BASELINE_RUN_ID: ${{ inputs.baseline_run_id }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          SCORER: ${{ inputs.scorer }}
          THRESHOLD: ${{ inputs.threshold }}
          MIN_OVERLAP: ${{ inputs.min_overlap }}
        run: |
          python eval_gate.py \
            --baseline-run-id "$BASELINE_RUN_ID" \
            --candidate-run-id "$CANDIDATE_RUN_ID" \
            --scorer "$SCORER" \
            --threshold "$THRESHOLD" \
            --min-overlap "$MIN_OVERLAP"
